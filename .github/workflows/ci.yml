name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
      - name: Verify GitHub Actions are SHA-pinned
        run: |
          UNPINNED=$(grep -rn '^\s*-\?\s*uses:' .github/workflows/*.yml | grep -v '@[a-f0-9]\{40\}' || true)
          if [ -n "$UNPINNED" ]; then
            echo "::error::Found GitHub Actions not pinned to SHA:"
            echo "$UNPINNED"
            exit 1
          fi
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npx lockfile-lint --path package-lock.json --type npm --allowed-hosts npm --validate-https
      - run: npm run lint
      - run: npm run build
      - run: npx vitest run --coverage
      - uses: codecov/codecov-action@ad3126e916f78f00edff4ed0317cf185271ccc2d # v5.5.2
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: garaemon/asciinema-editor
