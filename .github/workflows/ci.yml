name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - name: Verify GitHub Actions are SHA-pinned
        run: |
          UNPINNED=$(grep -rn '^\s*-\?\s*uses:' .github/workflows/*.yml | grep -v '@[a-f0-9]\{40\}' || true)
          if [ -n "$UNPINNED" ]; then
            echo "::error::Found GitHub Actions not pinned to SHA:"
            echo "$UNPINNED"
            exit 1
          fi
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npx lockfile-lint --path package-lock.json --type npm --allowed-hosts npm --validate-https
      - run: npm run lint
      - run: npm run build
      - run: npx vitest run --coverage
      - uses: codecov/codecov-action@1f60566a86da84c4b4b64c17662a90de97fbb8d7 # v5.4.2
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: garaemon/asciinema-editor
